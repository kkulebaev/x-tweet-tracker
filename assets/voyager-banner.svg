<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1220"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="120" y1="60" x2="520" y2="260" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A855F7"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(160 150) rotate(90) scale(120 120)">
      <stop stop-color="#22D3EE" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="300" rx="24" fill="url(#bg)"/>

  <!-- subtle glow behind icon -->
  <circle cx="160" cy="150" r="120" fill="url(#glow)"/>

  <!-- minimal probe / antenna mark -->
  <rect x="84" y="84" width="152" height="132" rx="18" fill="#0F172A" stroke="#1F2937"/>

  <!-- dish -->
  <path d="M132 172c22 20 50 20 72 0" stroke="url(#accent)" stroke-width="10" stroke-linecap="round"/>
  <path d="M124 160c30 32 70 32 100 0" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" opacity="0.8"/>

  <!-- mast -->
  <path d="M168 110v58" stroke="url(#accent)" stroke-width="10" stroke-linecap="round"/>
  <circle cx="168" cy="110" r="8" fill="#F59E0B"/>

  <!-- signal arcs -->
  <path d="M210 112c18 12 18 36 0 48" stroke="#A855F7" stroke-width="6" stroke-linecap="round" opacity="0.9"/>
  <path d="M226 104c26 18 26 54 0 72" stroke="#A855F7" stroke-width="4" stroke-linecap="round" opacity="0.6"/>

  <text x="300" y="140" fill="#E5E7EB" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="56" font-weight="800">Voyager</text>
  <text x="300" y="188" fill="#9CA3AF" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="24">X Tweet Tracker · Admin bot + Cron worker</text>
  <text x="300" y="238" fill="#6B7280" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas" font-size="18">Railway · Postgres · Prisma · grammY</text>

  <!-- tiny stars -->
  <circle cx="1120" cy="70" r="2" fill="#93C5FD" opacity="0.7"/>
  <circle cx="1080" cy="110" r="1.5" fill="#FDE68A" opacity="0.6"/>
  <circle cx="1140" cy="150" r="1.5" fill="#C4B5FD" opacity="0.6"/>
  <circle cx="1050" cy="190" r="2" fill="#93C5FD" opacity="0.5"/>
</svg>
